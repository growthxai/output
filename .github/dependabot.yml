version: 2
updates:
  - package-ecosystem: npm
    directories:
      - '/'
      - '/api'
      - '/sdk/core'
      - '/sdk/cli'
      - '/sdk/http'
      - '/sdk/evals'
      - '/sdk/credentials'
      - '/sdk/llm'
      - '/test_workflows'
    schedule:
      interval: weekly
    open-pull-requests-limit: 25
    groups:
      minor-updates:
        update-types: ['patch', 'minor']
        applies-to: 'version-updates'
