name: Publish Dev

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to checkout and publish (branch, tag, or full SHA). Must exist in this repository.'
        required: false
        default: 'main'
        type: string

concurrency:
  group: publish-npm-dev-manual
  cancel-in-progress: false

jobs:
  publish:
    name: Publish NPM pre-release packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: node:24.13.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Enable pnpm
        run: corepack enable

      - name: Validate
        run: ./ops/validate.sh

      - name: Publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ./ops/publish_npm_dev.sh

      - name: Add publish summary to job
        run: |
          if [ -f pnpm-publish-summary.json ]; then
            {
              echo '### npm publish summary'
              echo ''
              echo '```json'
              cat pnpm-publish-summary.json
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
