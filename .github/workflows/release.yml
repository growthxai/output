# Creates a "Version Packages" PR when there are unreleased changesets.
# When that PR is merged, runs version is already on main; then publish + deploy run.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  release:
    name: Version PR or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable pnpm
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          commit: 'chore(release): version packages'
          title: 'Version Packages'
          publish: |
            ./ops/validate.sh &&
            ./ops/publish_npm_prod.sh &&
            ./ops/publish_api_image.sh

      - name: Get version
        id: version
        if: steps.changesets.outputs.published == 'true'
        run: echo "version=$(node -p "require('./sdk/core/package.json').version")" >> $GITHUB_OUTPUT

      - name: Push tag
        if: steps.changesets.outputs.published == 'true'
        uses: actions-ecosystem/action-push-tag@v1
        with:
          tag: v${{ steps.version.outputs.version }}
          message: v${{ steps.version.outputs.version }}
