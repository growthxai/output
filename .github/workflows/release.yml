# Creates a "Version Packages" PR when there are unreleased changesets.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_GH_TOKEN }}

      - name: Enable pnpm
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.13'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Simulate upcoming release
        run: echo "RELEASE_VERSION=$(./ops/get_bump.sh)" >> "$GITHUB_ENV"

      - name: Create release pull request
        uses: changesets/action@v1
        with:
          commit: "chore(release): v${{ env.RELEASE_VERSION }}"
          title: "chore(release): v${{ env.RELEASE_VERSION }}"
          version: ./ops/bump_release.sh
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GH_TOKEN }}
