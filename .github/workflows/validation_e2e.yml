name: End to End Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'test_workflows/**'
      - 'api/**'
      - 'sdk/**'

jobs:
  test:
    name: Run end to end tests
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' }}
    permissions:
      contents: read
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run tests
        run: ./ops/test_e2e.sh
