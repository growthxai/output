name: Workflow System Integration Test

on:
  pull_request:
    branches: [main]
    paths:
      - 'test_workflows/**'
      - 'api/**'
      - 'sdk/**'

jobs:
  dev-integration:
    name: Workflow System Integration Test
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' }}
    permissions:
      contents: read
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Create test_workflows/.env
        run: |
          printf 'ANTHROPIC_API_KEY=%s\nOPENAI_API_KEY=%s\n' \
            "${ANTHROPIC_API_KEY:-dummy}" \
            "${OPENAI_API_KEY:-dummy}" > test_workflows/.env
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run workflow system integration test
        run: npx vitest run --config vitest.integration.config.js ops/test_workflow_cli.integration.test.js
