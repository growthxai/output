name: Publish Dev

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to checkout and publish (branch, tag, or full SHA). Defaults to the dispatched ref.'
        required: false
        type: string

concurrency: ${{ github.workflow }}

jobs:
  publish:
    name: Publish "dev" version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Enable pnpm
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: 'pnpm'

      - name: Validate
        run: ./ops/validate.sh

      - name: Bumping version
        run: ./ops/bump_prerelease.sh "dev.${GITHUB_SHA:0:7}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish API
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: ./ops/publish_api.sh --no-aliases

      - name: Publish NPM
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          ./ops/publish_npm.sh "dev"
          if [ -f pnpm-publish-summary.json ]; then
            {
              echo '### npm publish summary'
              echo '```json'
              cat pnpm-publish-summary.json
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
